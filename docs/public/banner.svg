<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1127"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blueGlow" cx="70%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#e8713a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fb923c"/>
    </linearGradient>
    <linearGradient id="vibeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <rect width="1280" height="320" fill="url(#purpleGlow)"/>
  <rect width="1280" height="320" fill="url(#blueGlow)"/>

  <!-- 背景微弱网格 -->
  <g opacity="0.04" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="0" x2="1280" y2="320"/>
    <line x1="1280" y1="0" x2="0" y2="320"/>
    <line x1="640" y1="0" x2="640" y2="320"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="320"/>
    <line x1="960" y1="0" x2="960" y2="320"/>
  </g>

  <!-- 漂浮粒子 -->
  <g opacity="0.3" fill="#7c3aed">
    <circle cx="80" cy="60" r="1.5" filter="url(#glow)"/>
    <circle cx="1200" cy="40" r="1.5"/>
    <circle cx="900" cy="100" r="2" filter="url(#glow)"/>
    <circle cx="200" cy="250" r="1.5"/>
  </g>
  <g opacity="0.2" fill="#3b82f6">
    <circle cx="500" cy="30" r="1.5"/>
    <circle cx="700" cy="280" r="1.5" filter="url(#glow)"/>
  </g>

  <!-- 左侧: 终端窗口 -->
  <g transform="translate(90, 70)">
    <!-- 终端窗口 -->
    <rect x="0" y="0" width="320" height="180" rx="12" fill="url(#codeGrad)" stroke="#334155" stroke-width="1.5"/>
    <!-- 终端标题栏 -->
    <rect x="0" y="0" width="320" height="35" rx="12" fill="#1e293b"/>
    <rect x="0" y="20" width="320" height="15" fill="#1e293b"/>
    <!-- 三个圆点 -->
    <circle cx="25" cy="18" r="7" fill="#ef4444" opacity="0.8"/>
    <circle cx="50" cy="18" r="7" fill="#eab308" opacity="0.8"/>
    <circle cx="75" cy="18" r="7" fill="#22c55e" opacity="0.8"/>
    <text x="100" y="22" font-family="Consolas, monospace" font-size="13" fill="#94a3b8">terminal</text>
    <!-- 终端内容 -->
    <text x="15" y="60" font-family="Consolas, monospace" font-size="16" fill="#94a3b8">~/your-project $</text>
    <text x="195" y="60" font-family="Consolas, monospace" font-size="16" fill="#f97316" filter="url(#glow)">claude</text>
    <text x="15" y="90" font-family="Consolas, monospace" font-size="14" fill="#7c3aed">// 理解需求 → 制定计划</text>
    <text x="15" y="115" font-family="Consolas, monospace" font-size="14" fill="#3b82f6">// 执行操作 → 观察结果</text>
    <text x="15" y="140" font-family="Consolas, monospace" font-size="14" fill="#22c55e">// 修正迭代 → 直到完成 ✅</text>
    <!-- 光标 -->
    <rect x="268" y="148" width="10" height="15" fill="#f97316" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- 中间区域: 核心标语 -->
  <text x="640" y="100" font-family="'Georgia', serif" font-size="56" fill="url(#textGrad)" text-anchor="middle" filter="url(#softGlow)" font-weight="bold" letter-spacing="3">Code is cheap</text>
  <text x="640" y="155" font-family="'Georgia', serif" font-size="40" fill="#e2e8f0" text-anchor="middle" filter="url(#softGlow)" letter-spacing="2" font-style="italic">show me your prompt</text>

  <!-- 分隔线 -->
  <line x1="440" y1="180" x2="840" y2="180" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="440" cy="180" r="2.5" fill="#f97316" opacity="0.7"/>
  <circle cx="840" cy="180" r="2.5" fill="#f97316" opacity="0.7"/>

  <!-- VIBE CODING -->
  <text x="640" y="245" font-family="'Helvetica Neue', 'Arial Black', sans-serif" font-size="72" fill="url(#vibeGrad)" text-anchor="middle" filter="url(#strongGlow)" font-weight="900" letter-spacing="8">VIBE CODING</text>

  <!-- 三个方法论标签 -->
  <rect x="380" y="265" width="130" height="30" rx="15" fill="#7c3aed" opacity="0.2" stroke="#7c3aed" stroke-width="1"/>
  <text x="445" y="285" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#a78bfa" text-anchor="middle" font-weight="600">意图驱动</text>

  <rect x="555" y="265" width="170" height="30" rx="15" fill="#f97316" opacity="0.2" stroke="#f97316" stroke-width="1"/>
  <text x="640" y="285" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#fb923c" text-anchor="middle" font-weight="600">迭代验证</text>

  <rect x="770" y="265" width="130" height="30" rx="15" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="835" y="285" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#60a5fa" text-anchor="middle" font-weight="600">人做守门员</text>

  <!-- 角落装饰 -->
  <path d="M0,0 L30,0 L0,30" fill="#f97316" opacity="0.25"/>
  <path d="M1280,320 L1250,320 L1280,290" fill="#7c3aed" opacity="0.25"/>
</svg>